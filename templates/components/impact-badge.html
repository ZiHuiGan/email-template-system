<!-- Impact Badge Component -->
<span class="badge" style="
    display: inline-block;
    background: var(--highlight);
    color: white;
    padding: clamp(4px, 0.6vw, 6px) clamp(8px, 1.2vw, 12px);
    border-radius: 12px;
    font-size: clamp(11px, 0.9vw, 13px);
    font-weight: 600;
    margin: 0 8px 8px 0;
">
    {{ label }}: {{ value }}
</span>
