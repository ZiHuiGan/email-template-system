<!DOCTYPE html>
<html lang="en" xmlns="http://www.w3.org/1999/xhtml" xmlns:v="urn:schemas-microsoft-com:vml" xmlns:o="urn:schemas-microsoft-com:office:office">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="x-apple-disable-message-reformatting" />
    <meta name="format-detection" content="telephone=no,address=no,email=no,date=no,url=no" />
    <title>{{ email_title }}</title>

    <!-- Fonts from preset -->
    {{ font_stack }}

    <!--[if mso]>
    <noscript>
        <xml>
            <o:OfficeDocumentSettings>
                <o:AllowPNG/>
                <o:PixelsPerInch>96</o:PixelsPerInch>
            </o:OfficeDocumentSettings>
        </xml>
    </noscript>
    <![endif]-->

    <style>
        /* ==============================================
           EMAIL CLIENT CSS RESETS (from MailChimp)
           ============================================== */

        /* Outlook.com / Hotmail — prevent forced style overrides */
        .ReadMsgBody { width: 100%; }
        .ExternalClass { width: 100%; }
        .ExternalClass,
        .ExternalClass p,
        .ExternalClass span,
        .ExternalClass font,
        .ExternalClass td,
        .ExternalClass div { line-height: 100%; }

        /* Outlook desktop — remove table spacing */
        table { mso-table-lspace: 0pt; mso-table-rspace: 0pt; }

        /* Outlook desktop — prevent link padding */
        #outlook a { padding: 0; }

        /* iOS / WebKit — prevent auto text size adjustment */
        body { -webkit-text-size-adjust: 100%; -ms-text-size-adjust: 100%; }

        /* Remove image borders and outlines (Outlook adds blue borders) */
        img { border: 0; outline: none; text-decoration: none; -ms-interpolation-mode: bicubic; }
        a img { border: 0; }

        /* Gmail — remove body margin */
        body { margin: 0 !important; padding: 0 !important; }

        /* Yahoo — remove centering table */
        table { border-collapse: collapse !important; }

        /* ==============================================
           CSS CUSTOM PROPERTIES (from preset)
           ============================================== */
        :root {
            /* Colors */
            --bg-primary: {{ bg_primary }};
            --bg-section: {{ bg_section }};
            --text-primary: {{ text_primary }};
            --text-secondary: {{ text_secondary }};
            --accent: {{ accent }};
            --highlight: {{ highlight }};
            --border: {{ border }};

            /* Typography */
            --font-headings: {{ font_headings }};
            --font-body: {{ font_body }};
            --font-mono: {{ font_mono }};
            --headline-size: {{ headline_size }};
            --body-size: {{ body_size }};
            --mono-size: {{ mono_size }};

            /* Spacing */
            --section-padding: {{ section_padding }};
            --content-gap: clamp(1rem, 2vw, 2rem);
            --border-radius: {{ border_radius }};

            /* Line height */
            --line-height: {{ line_height }};
        }

        /* ==============================================
           BASE STYLES
           ============================================== */
        body {
            font-family: var(--font-body);
            font-size: var(--body-size);
            color: var(--text-primary);
            line-height: var(--line-height);
            background-color: var(--bg-primary);
            width: 100%;
            height: 100%;
        }

        /* ==============================================
           EMAIL CONTAINER
           ============================================== */
        .email-container {
            max-width: 600px;
            margin: 0 auto;
            background-color: var(--bg-primary);
            width: 100%;
        }

        /* ==============================================
           PREHEADER (hidden inbox preview text)
           ============================================== */
        .preheader {
            display: none !important;
            visibility: hidden;
            mso-hide: all;
            font-size: 1px;
            line-height: 1px;
            max-height: 0;
            max-width: 0;
            opacity: 0;
            overflow: hidden;
        }

        /* ==============================================
           HEADER
           ============================================== */
        .header {
            background-color: var(--accent);
            color: #ffffff;
            padding: clamp(16px, 3vw, 24px);
            text-align: center;
        }

        .header h1 {
            font-family: var(--font-headings);
            font-size: var(--headline-size);
            color: #ffffff;
            margin: 0;
            font-weight: 700;
        }

        .header-meta {
            font-size: clamp(12px, 0.9vw, 14px);
            color: rgba(255, 255, 255, 0.85);
            margin-top: 8px;
        }

        /* ==============================================
           SECTIONS
           ============================================== */
        .section {
            background-color: var(--bg-section);
            padding: var(--section-padding);
            margin: clamp(8px, 1.5vw, 16px);
            border-radius: var(--border-radius);
            border: 1px solid var(--border);
        }

        .section-title {
            font-family: var(--font-headings);
            font-size: clamp(18px, 3.5vw, 22px);
            color: var(--text-primary);
            margin: 0 0 var(--content-gap) 0;
            font-weight: 700;
        }

        .section-subtitle {
            font-size: var(--body-size);
            color: var(--text-secondary);
            margin: 0 0 clamp(12px, 1.5vw, 16px) 0;
            font-weight: 500;
        }

        /* ==============================================
           TYPOGRAPHY
           ============================================== */
        h1, h2, h3 {
            font-family: var(--font-headings);
            color: var(--text-primary);
            margin: 0 0 var(--content-gap) 0;
        }

        h1 { font-size: var(--headline-size); font-weight: 700; }
        h2 { font-size: clamp(20px, 3vw, 24px); font-weight: 600; }
        h3 { font-size: clamp(16px, 2.5vw, 18px); font-weight: 600; }

        p {
            margin: 0 0 var(--content-gap) 0;
            line-height: var(--line-height);
        }

        a { color: var(--accent); text-decoration: none; }
        a:hover { text-decoration: underline; }

        /* ==============================================
           BUTTONS
           ============================================== */
        .cta-button {
            display: inline-block;
            background-color: var(--accent);
            color: #ffffff;
            padding: clamp(10px, 1.5vw, 14px) clamp(16px, 2.5vw, 24px);
            text-decoration: none;
            border-radius: 4px;
            font-weight: 600;
            font-size: clamp(13px, 1.1vw, 15px);
            border: none;
            cursor: pointer;
            margin: var(--content-gap) 0;
        }

        .cta-button:hover { opacity: 0.9; }
        .cta-button.secondary { background-color: var(--highlight); }

        /* ==============================================
           IMAGES
           ============================================== */
        img {
            max-width: 100%;
            height: auto;
            display: block;
            margin: var(--content-gap) 0;
        }

        .image-container {
            max-width: 100%;
            max-height: clamp(200px, 40vh, 400px);
            overflow: hidden;
            border-radius: var(--border-radius);
            margin: var(--content-gap) 0;
        }

        .image-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            margin: 0;
        }

        /* ==============================================
           LISTS
           ============================================== */
        ul, ol {
            margin: 0 0 var(--content-gap) 0;
            padding-left: clamp(20px, 3vw, 32px);
        }

        li {
            margin: clamp(4px, 0.8vw, 8px) 0;
            line-height: var(--line-height);
        }

        /* ==============================================
           CODE
           ============================================== */
        code {
            font-family: var(--font-mono);
            font-size: var(--mono-size);
            background: rgba(0, 0, 0, 0.05);
            padding: 2px 6px;
            border-radius: 3px;
            color: var(--accent);
        }

        .code-block {
            background: #f5f5f5;
            padding: clamp(12px, 2vw, 16px);
            border-radius: var(--border-radius);
            overflow-x: auto;
            margin: var(--content-gap) 0;
            border-left: 4px solid var(--accent);
        }

        .code-block code {
            background: transparent;
            padding: 0;
            color: var(--text-primary);
            display: block;
            white-space: pre-wrap;
            word-wrap: break-word;
            font-size: var(--mono-size);
        }

        /* ==============================================
           BADGES & TAGS
           ============================================== */
        .badge {
            display: inline-block;
            background-color: var(--highlight);
            color: #ffffff;
            padding: clamp(4px, 0.6vw, 6px) clamp(8px, 1.2vw, 12px);
            border-radius: 12px;
            font-size: clamp(11px, 0.9vw, 13px);
            font-weight: 600;
            margin-right: 8px;
            margin-bottom: 8px;
        }

        .badge.primary { background-color: var(--accent); }
        .badge.secondary { background-color: var(--text-secondary); }

        /* ==============================================
           FOOTER
           ============================================== */
        .footer {
            text-align: center;
            padding: clamp(16px, 3vw, 24px);
            font-size: clamp(11px, 0.8vw, 12px);
            color: var(--text-secondary);
            border-top: 1px solid var(--border);
            margin-top: clamp(16px, 3vw, 24px);
        }

        .footer a { color: var(--accent); text-decoration: none; }
        .footer a:hover { text-decoration: underline; }

        /* ==============================================
           DARK MODE
           ============================================== */
        @media (prefers-color-scheme: dark) {
            :root {
                --bg-primary: {{ dark_bg_primary }};
                --bg-section: {{ dark_bg_section }};
                --text-primary: {{ dark_text_primary }};
                --text-secondary: {{ dark_text_secondary }};
            }

            code { background: rgba(255, 255, 255, 0.1); }
            .code-block { background: rgba(255, 255, 255, 0.05); }
        }

        /* ==============================================
           RESPONSIVE
           ============================================== */
        @media (max-width: 480px) {
            .email-container {
                width: 100% !important;
                padding: 0;
            }
            .section {
                margin: clamp(4px, 1vw, 8px);
                border-radius: 4px;
            }
        }

        /* ==============================================
           REDUCED MOTION
           ============================================== */
        @media (prefers-reduced-motion: reduce) {
            * {
                animation-duration: 0.01ms !important;
                transition-duration: 0.01ms !important;
            }
        }
    </style>
</head>

<body bgcolor="{{ bg_primary }}" style="margin: 0; padding: 0; background-color: {{ bg_primary }};">

    <!-- Preheader text (visible in inbox preview, hidden in email body) -->
    <span class="preheader">{{ preheader_text }}</span>

    <!-- Full-width background wrapper -->
    <table role="presentation" cellspacing="0" cellpadding="0" border="0" width="100%" style="background-color: {{ bg_primary }};">
    <tr>
    <td align="center" valign="top">

    <!--[if (gte mso 9)|(IE)]>
    <table align="center" border="0" cellspacing="0" cellpadding="0" width="600">
    <tr><td align="center" valign="top" width="600">
    <![endif]-->

    <div class="email-container" style="max-width: 600px; margin: 0 auto; background-color: {{ bg_primary }}; color: {{ text_primary }}; font-family: {{ font_body }};">

        <!-- Header -->
        <table role="presentation" cellspacing="0" cellpadding="0" border="0" width="100%">
        <tr>
        <td class="header" style="background-color: {{ accent }}; color: #ffffff; padding: 20px; text-align: center;">
            <h1 style="font-family: {{ font_headings }}; color: #ffffff; margin: 0; font-weight: 700;">{{ preset_header }}</h1>
            <div class="header-meta" style="color: rgba(255,255,255,0.85); margin-top: 8px; font-size: 13px;">{{ header_meta }}</div>
        </td>
        </tr>
        </table>

        <!-- Email Content (inline colors for Gmail which strips <style> blocks) -->
        <table role="presentation" cellspacing="0" cellpadding="0" border="0" width="100%">
        <tr>
        <td style="padding: 16px; background-color: {{ bg_primary }}; color: {{ text_primary }}; font-family: {{ font_body }}; font-size: 16px; line-height: {{ line_height }};">
            {{ email_content }}
        </td>
        </tr>
        </table>

        <!-- Footer -->
        <table role="presentation" cellspacing="0" cellpadding="0" border="0" width="100%">
        <tr>
        <td class="footer" style="text-align: center; padding: 20px; border-top: 1px solid {{ border }}; background-color: {{ bg_primary }};">
            <p style="margin: 0; font-size: 12px; color: {{ text_secondary }};">&copy; 2026 News Intelligence. <a href="{{ unsubscribe_url }}" style="color: {{ accent }};">Unsubscribe</a></p>
        </td>
        </tr>
        </table>

    </div>

    <!--[if (gte mso 9)|(IE)]>
    </td></tr></table>
    <![endif]-->

    </td>
    </tr>
    </table>

</body>
</html>
