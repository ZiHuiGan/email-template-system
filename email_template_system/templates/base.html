<!DOCTYPE html>
<html lang="en" xmlns="http://www.w3.org/1999/xhtml" xmlns:v="urn:schemas-microsoft-com:vml" xmlns:o="urn:schemas-microsoft-com:office:office">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="x-apple-disable-message-reformatting" />
    <meta name="format-detection" content="telephone=no,address=no,email=no,date=no,url=no" />
    <title>{{ email_title }}</title>

    <!-- Fonts from preset (empty string when preset uses only system fonts) -->
    {{ font_stack }}

    <!--[if mso]>
    <noscript>
        <xml>
            <o:OfficeDocumentSettings>
                <o:AllowPNG/>
                <o:PixelsPerInch>96</o:PixelsPerInch>
            </o:OfficeDocumentSettings>
        </xml>
    </noscript>
    <![endif]-->

    <style>
        /* ==============================================
           EMAIL CLIENT CSS RESETS
           ============================================== */
        .ReadMsgBody { width: 100%; }
        .ExternalClass { width: 100%; }
        .ExternalClass,
        .ExternalClass p,
        .ExternalClass span,
        .ExternalClass font,
        .ExternalClass td,
        .ExternalClass div { line-height: 100%; }
        table { mso-table-lspace: 0pt; mso-table-rspace: 0pt; }
        #outlook a { padding: 0; }
        body { -webkit-text-size-adjust: 100%; -ms-text-size-adjust: 100%; }
        img { border: 0; outline: none; text-decoration: none; -ms-interpolation-mode: bicubic; }
        a img { border: 0; }
        body { margin: 0 !important; padding: 0 !important; }
        table { border-collapse: collapse !important; }

        /* ==============================================
           CSS CUSTOM PROPERTIES (4-color palette from preset)
           canvas  = bg_primary / bg_section (unified)
           ink     = text_primary
           accent  = accent / highlight (unified)
           mute    = text_secondary / border (unified)
           ============================================== */
        :root {
            --canvas: {{ bg_primary }};
            --ink: {{ text_primary }};
            --accent: {{ accent }};
            --mute: {{ text_secondary }};

            --font-headings: {{ font_headings }};
            --font-body: {{ font_body }};
            --font-meta: system-ui, -apple-system, 'Segoe UI', sans-serif;
            --font-mono: {{ font_mono }};

            --headline-size: {{ headline_size }};
            --body-size: {{ body_size }};
            --mono-size: {{ mono_size }};

            --section-padding: {{ section_padding }};
            --line-height: {{ line_height }};
            --border-radius: {{ border_radius }};
        }

        /* ==============================================
           BASE
           ============================================== */
        body {
            font-family: var(--font-body);
            font-size: var(--body-size);
            color: var(--ink);
            line-height: var(--line-height);
            background-color: var(--canvas);
            text-align: left; /* FT style — no implicit centering from parent table */
        }

        .email-container {
            max-width: 600px;
            margin: 0 auto;               /* centers the 600px column on the viewport */
            background-color: var(--canvas);
            text-align: left;             /* but content inside is strictly left-aligned */
        }

        /* FT alignment guard: every block-level content element is left-aligned.
           Defends against ancestor `<table align="center">` implicit centering in
           some older email clients. */
        .header, .top-story, .theme-box, .article-row, .hit-list,
        .weekly-extra, .footer, .article-insights, .theme-insight,
        .section-label, .glossary-entry, h1, h2, h3, p, ul, li {
            text-align: left;
        }

        .preheader {
            display: none !important;
            visibility: hidden;
            mso-hide: all;
            font-size: 1px;
            line-height: 1px;
            max-height: 0;
            max-width: 0;
            opacity: 0;
            overflow: hidden;
        }

        /* ==============================================
           HEADER — Editorial "minimal" style: transparent bg,
           accent-colored eyebrow label, big serif greeting,
           thin ink-colored bottom rule.
           ============================================== */
        .header {
            padding: 28px 28px 18px;
            border-bottom: 2px solid var(--ink);
            background-color: var(--canvas);
        }
        .header-eyebrow {
            font-family: var(--font-meta);
            font-size: 10px;
            letter-spacing: 3px;
            color: var(--accent);
            font-weight: 700;
            text-transform: uppercase;
        }
        .header h1 {
            font-family: var(--font-headings);
            font-size: var(--headline-size);
            color: var(--ink);
            margin: 6px 0 0 0;
            font-weight: 700;
            letter-spacing: -0.3px;
            line-height: 1.2;
        }
        .header-meta {
            font-family: var(--font-meta);
            font-size: 11px;
            color: var(--mute);
            margin-top: 4px;
        }

        /* ==============================================
           TYPOGRAPHY
           ============================================== */
        h1, h2, h3 {
            font-family: var(--font-headings);
            color: var(--ink);
            margin: 0 0 12px 0;
        }
        h1 { font-size: var(--headline-size); font-weight: 700; letter-spacing: -0.3px; }
        h2 { font-size: clamp(18px, 3vw, 22px); font-weight: 700; letter-spacing: -0.2px; }
        h3 { font-size: clamp(15px, 2.5vw, 17px); font-weight: 700; }
        p { margin: 0 0 12px 0; line-height: var(--line-height); }
        a { color: var(--accent); text-decoration: none; }
        a:hover { text-decoration: underline; }

        /* ==============================================
           SECTION LABEL (⭐ TOP STORY, 📌 THEME 1/3, ⚡ QUICK HITS, OTHER SIGNALS)
           NOTE: we retire emoji in content; labels are plain text from emailer.py.
           ============================================== */
        .section-label {
            font-family: var(--font-meta);
            font-size: 10px;
            letter-spacing: 3px;
            color: var(--accent);
            font-weight: 700;
            text-transform: uppercase;
            margin-bottom: 6px;
        }
        .section-label.muted { color: var(--mute); }

        /* ==============================================
           THEME BLOCK (flat layout, no box — FT style)
           ============================================== */
        .theme-box {
            background: none;
            border: none;
            border-radius: 0;
            padding: 24px 28px;
            margin: 0;
        }
        .theme-box + .theme-box { margin-top: 0; }
        .theme-box h2 {
            font-size: 20px;
            margin-bottom: 4px;
            line-height: 1.25;
        }
        .theme-article-count {
            font-family: var(--font-meta);
            font-size: 11px;
            color: var(--mute);
            margin-bottom: 8px;
        }

        /* Article row — numbered, no dividers */
        .article-row {
            padding: 14px 0;
        }
        .article-row + .article-row {
            border-top: none;
        }
        .article-row .article-title {
            font-family: var(--font-headings);
            font-size: 14px;
            font-weight: 700;
            color: var(--ink);
            margin: 0 0 4px 0;
            line-height: 1.3;
        }
        .article-row .article-meta {
            font-family: var(--font-meta);
            font-size: 11px;
            color: var(--mute);
            margin: 0 0 6px 0;
        }
        .article-row .article-summary {
            font-size: 12.5px;
            color: var(--ink);
            line-height: 1.55;
            margin: 0;
        }

        /* Theme insight (bottom of theme-box) */
        .theme-insight {
            margin-top: 12px;
            padding: 10px 12px;
            background: rgba(184, 69, 42, 0.10);
            border-left: 3px solid var(--accent);
        }
        .theme-insight-label {
            font-family: var(--font-meta);
            font-size: 10px;
            letter-spacing: 2px;
            color: var(--accent);
            font-weight: 700;
            margin-bottom: 4px;
        }
        .theme-insight-text {
            font-size: 12.5px;
            color: var(--ink);
            font-style: italic;
            line-height: 1.5;
            margin: 0;
        }

        /* ==============================================
           TOP STORY (hero)
           ============================================== */
        .top-story {
            padding: 24px 28px;
        }
        .top-story .article-title {
            font-family: var(--font-headings);
            font-size: 22px;
            font-weight: 700;
            letter-spacing: -0.3px;
            line-height: 1.2;
            color: var(--ink);
            margin: 10px 0 8px 0;
        }
        .top-story .article-meta {
            font-family: var(--font-meta);
            font-size: 11.5px;
            color: var(--mute);
            margin-bottom: 12px;
        }
        .top-story .article-summary {
            font-size: 13.5px;
            color: var(--ink);
            line-height: 1.6;
            margin: 0 0 14px 0;
        }
        .article-insights {
            padding: 12px 14px;
            background: rgba(184, 69, 42, 0.10);
            border-left: 3px solid var(--accent);
        }
        .article-insights-label {
            font-family: var(--font-meta);
            font-size: 10px;
            letter-spacing: 2px;
            color: var(--accent);
            font-weight: 700;
            margin-bottom: 6px;
        }
        .article-insights ul {
            list-style: none;
            padding: 0;
            margin: 0;
        }
        .article-insights li {
            font-size: 12.5px;
            color: var(--ink);
            line-height: 1.5;
            font-style: italic;
            padding: 3px 0 3px 14px;
            position: relative;
        }
        .article-insights li::before {
            content: "—";
            position: absolute;
            left: 0;
            color: var(--accent);
            font-style: normal;
        }

        /* ==============================================
           QUICK HITS / OTHER SIGNALS — flat, numbered, same as Top Story / Theme
           ============================================== */
        .hit-list {
            padding: 4px 28px 12px;
        }
        .hit-list .article-row {
            padding: 14px 0;
            border-top: none;
        }
        .hit-list.other-signals .article-row {
            padding: 10px 0;
        }

        /* ==============================================
           SECTION DIVIDER (between Top Story / Themes / Quick Hits / Other Signals)
           ============================================== */
        .section-divider {
            border-top: 1px solid rgba(138, 127, 102, 0.3);
            margin: 0;
        }

        /* ==============================================
           WEEKLY EXTRAS — Term Glossary, Theme Audit
           ============================================== */
        .weekly-extra {
            padding: 20px 28px;
            border-top: 1px solid rgba(138, 127, 102, 0.3);
        }
        .weekly-extra h2 {
            font-size: 17px;
        }
        .glossary-entry {
            padding: 8px 0;
            border-top: 1px dashed rgba(138, 127, 102, 0.3);
        }
        .glossary-entry:first-of-type { border-top: none; }
        .glossary-term {
            font-family: var(--font-headings);
            font-weight: 700;
            font-size: 13px;
            color: var(--ink);
        }
        .glossary-freq {
            font-family: var(--font-meta);
            font-size: 10.5px;
            color: var(--mute);
            font-style: italic;
        }
        .glossary-def {
            font-size: 12.5px;
            color: var(--ink);
            line-height: 1.5;
            margin: 3px 0 0 0;
        }

        /* ==============================================
           FOOTER
           ============================================== */
        .footer {
            padding: 22px 28px 28px;
            border-top: 2px solid var(--ink);
            font-family: var(--font-meta);
            font-size: 10.5px;
            color: var(--mute);
            letter-spacing: 0.5px;
        }
        .footer a { color: var(--mute); }

        /* ==============================================
           DARK MODE (optional — preserved from original)
           ============================================== */
        @media (prefers-color-scheme: dark) {
            :root {
                --canvas: {{ dark_bg_primary }};
                --ink: {{ dark_text_primary }};
                --mute: {{ dark_text_secondary }};
            }
        }

        /* ==============================================
           RESPONSIVE
           ============================================== */
        @media (max-width: 480px) {
            .email-container { width: 100% !important; }
            .header, .top-story, .hit-list, .weekly-extra { padding-left: 18px; padding-right: 18px; }
            .theme-box { margin-left: 18px; margin-right: 18px; }
            .footer { padding-left: 18px; padding-right: 18px; }
        }

        @media (prefers-reduced-motion: reduce) {
            * { animation-duration: 0.01ms !important; transition-duration: 0.01ms !important; }
        }
    </style>
</head>

<body bgcolor="{{ bg_primary }}" style="margin: 0; padding: 0; background-color: {{ bg_primary }};">

    <!-- Preheader text (visible in inbox preview, hidden in email body) -->
    <span class="preheader">{{ preheader_text }}</span>

    <!-- Full-width background wrapper -->
    <table role="presentation" cellspacing="0" cellpadding="0" border="0" width="100%" style="background-color: {{ bg_primary }};">
    <tr>
    <td align="center" valign="top">

    <!--[if (gte mso 9)|(IE)]>
    <table align="center" border="0" cellspacing="0" cellpadding="0" width="600">
    <tr><td align="center" valign="top" width="600">
    <![endif]-->

    <div class="email-container" style="max-width: 600px; margin: 0 auto; background-color: {{ bg_primary }}; color: {{ text_primary }}; font-family: {{ font_body }};">

        {{ email_content }}

    </div>

    <!--[if (gte mso 9)|(IE)]>
    </td></tr></table>
    <![endif]-->

    </td>
    </tr>
    </table>

</body>
</html>
